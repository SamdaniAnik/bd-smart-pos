name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + syntax + prisma)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma format check
        run: npx prisma format --check || (echo "Run 'npx prisma format' locally" && exit 1)

      - name: Node syntax check (all .js under src/)
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! node --check "$f"; then
              echo "::error file=$f::Syntax error"
              fail=1
            fi
          done < <(find src -name "*.js" -type f)
          if [ "$fail" -eq 1 ]; then exit 1; fi

      - name: Boot smoke (config loader fail-fast tests)
        env:
          DATABASE_URL: "mysql://x"
          JWT_SECRET: "ci_dev_secret_long_enough_for_local_use_only"
          NODE_ENV: development
        run: |
          node -e "const c = require('./src/utils/config'); if (c.jwtSecret.length < 24) process.exit(1);"

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
